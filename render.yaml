services:
  - type: web
    name: fieraphone-web
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WHATSAPP_NUMBER
        value: 34600000000
